<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Auth Collector</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: #000;
            color: white;
            touch-action: none;
            overflow: hidden;
            margin: 0;
        }

        .pattern-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 50px auto;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 1;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            margin: auto;
        }

        .dot.active {
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transform: scale(1.3);
        }

        /* PIN PAD STYLES */
        #pin-pad {
            display: none;
            grid-template-columns: repeat(3, 80px);
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .pin-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid white;
            background: none;
            color: white;
            font-size: 24px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            left: 50%;
            transform: translateX(-50%);
        }

        .controls {
            margin-top: 20px;
            position: relative;
            z-index: 10;
        }

        button.toggle {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="controls">
        <button class="toggle" onclick="toggleMode()">Switch to PIN</button>
    </div>

    <div id="pattern-section">
        <h3>Draw Pattern</h3>
        <div class="pattern-container">
            <div class="grid">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="pin-section" style="display:none;">
        <h3>Enter PIN</h3>
        <div id="pin-pad">
            <button class="pin-btn" onpointerdown="logPin(1)">1</button>
            <button class="pin-btn" onpointerdown="logPin(2)">2</button>
            <button class="pin-btn" onpointerdown="logPin(3)">3</button>
            <button class="pin-btn" onpointerdown="logPin(4)">4</button>
            <button class="pin-btn" onpointerdown="logPin(5)">5</button>
            <button class="pin-btn" onpointerdown="logPin(6)">6</button>
            <button class="pin-btn" onpointerdown="logPin(7)">7</button>
            <button class="pin-btn" onpointerdown="logPin(8)">8</button>
            <button class="pin-btn" onpointerdown="logPin(9)">9</button>
            <div></div><button class="pin-btn" onpointerdown="logPin(0)">0</button>
        </div>
    </div>

    <p id="status">Ready</p>

    <script>
        let mode = 'pattern';
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, lastSnapPoint = null, sessionID = 0;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 3;

        function toggleMode() {
            const patSec = document.getElementById('pattern-section');
            const pinSec = document.getElementById('pin-section');
            const btn = document.querySelector('.toggle');
            if (mode === 'pattern') {
                patSec.style.display = 'none';
                pinSec.style.display = 'block';
                document.getElementById('pin-pad').style.display = 'grid';
                btn.innerText = 'Switch to Pattern';
                mode = 'pin';
            } else {
                patSec.style.display = 'block';
                pinSec.style.display = 'none';
                btn.innerText = 'Switch to PIN';
                mode = 'pattern';
            }
        }

        // --- PATTERN LOGIC ---
        canvas.onpointerdown = (e) => {
            drawing = true; sessionID = Date.now();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleMove(e);
        };
        canvas.onpointermove = (e) => { if (drawing) handleMove(e); };
        canvas.onpointerup = () => {
            drawing = false; lastSnapPoint = null;
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            }, 600);
        };

        function handleMove(e) {
            const rect = canvas.getBoundingClientRect();
            const tx = e.clientX - rect.left;
            const ty = e.clientY - rect.top;
            document.querySelectorAll('.dot').forEach(dot => {
                const r = dot.getBoundingClientRect();
                const dx = r.left + r.width / 2, dy = r.top + r.height / 2;
                if (Math.hypot(tx - dx, ty - dy) < 30 && !dot.classList.contains('active')) {
                    dot.classList.add('active');
                    if (lastSnapPoint) {
                        ctx.beginPath(); ctx.moveTo(lastSnapPoint.x, lastSnapPoint.y);
                        ctx.lineTo(dx, dy); ctx.stroke();
                    }
                    lastSnapPoint = { x: dx, y: dy };
                }
            });
            sendData('pattern', 'swipe', tx, ty, e.pressure);
        }

        // --- PIN LOGIC ---
        function logPin(num) {
            const sid = Date.now(); // Each tap is its own session or part of one
            // We use 0,0 for X,Y since the key itself is the data
            sendData('pin', num, 0, 0, 0.5, sid);
            document.getElementById('status').innerText = "Tap " + num + " captured";
        }

        function sendData(type, key, x, y, press, sid = sessionID) {
            fetch('/log_touch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sid, auth_type: type, key: key,
                    x: Math.round(x), y: Math.round(y),
                    pressure: press || 0.5, duration: Date.now()
                })
            })
                .then(response => response.json())
                .then(data => {
                    const status = document.getElementById('status');
                    status.innerText = "AI Verdict: " + data.prediction;
                    status.style.color = data.prediction === 'genuine' ? '#2ecc71' : '#e74c3c';
                });
        }
    </script>
</body>

</html>
