<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Biometric Collector</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: #000;
            color: white;
            touch-action: none;
            overflow: hidden;
            margin: 0;
        }

        .pattern-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 50px auto;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 1;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            margin: auto;
        }

        .dot.active {
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transform: scale(1.3);
        }

        #pin-section {
            margin-top: 50px;
        }

        #pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 20px;
            justify-content: center;
        }

        .pin-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid white;
            background: none;
            color: white;
            font-size: 24px;
            touch-action: manipulation;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            /* Let touches pass through to dots */
        }

        .controls {
            margin-top: 20px;
            position: relative;
            z-index: 10;
        }

        button.toggle {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="controls">
        <button class="toggle" onclick="toggleMode()">Switch to PIN</button>
    </div>

    <div id="pattern-section">
        <h3>Draw Pattern</h3>
        <div class="pattern-container" id="touch-zone">
            <div class="grid">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="pin-section" style="display:none;">
        <h3>Enter PIN</h3>
        <div id="pin-pad">
            <button class="pin-btn" onpointerdown="startTap(event, 1)" onpointerup="endTap(event)">1</button>
            <button class="pin-btn" onpointerdown="startTap(event, 2)" onpointerup="endTap(event)">2</button>
            <button class="pin-btn" onpointerdown="startTap(event, 3)" onpointerup="endTap(event)">3</button>
            <button class="pin-btn" onpointerdown="startTap(event, 4)" onpointerup="endTap(event)">4</button>
            <button class="pin-btn" onpointerdown="startTap(event, 5)" onpointerup="endTap(event)">5</button>
            <button class="pin-btn" onpointerdown="startTap(event, 6)" onpointerup="endTap(event)">6</button>
            <button class="pin-btn" onpointerdown="startTap(event, 7)" onpointerup="endTap(event)">7</button>
            <button class="pin-btn" onpointerdown="startTap(event, 8)" onpointerup="endTap(event)">8</button>
            <button class="pin-btn" onpointerdown="startTap(event, 9)" onpointerup="endTap(event)">9</button>
            <div></div>
            <button class="pin-btn" onpointerdown="startTap(event, 0)" onpointerup="endTap(event)">0</button>
        </div>
    </div>

    <p id="status">Ready</p>

    <script>
        let mode = 'pattern';
        let currentPoints = [];
        let sessionID = "";
        let drawing = false;
        let pinBuffer = ""; // New: keeps track of how many digits entered

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const touchZone = document.getElementById('touch-zone');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function toggleMode() {
            mode = (mode === 'pattern') ? 'pin' : 'pattern';
            document.getElementById('pattern-section').style.display = (mode === 'pattern') ? 'block' : 'none';
            document.getElementById('pin-section').style.display = (mode === 'pin') ? 'block' : 'none';
            document.querySelector('.toggle').innerText = (mode === 'pattern') ? 'Switch to PIN' : 'Switch to Pattern';
            // Reset when switching modes
            currentPoints = [];
            pinBuffer = "";
        }

        function recordPoint(e) {
            const lastP = currentPoints[currentPoints.length - 1];
            let accel = 0;
            if (lastP) {
                const dt = Date.now() - lastP.time;
                const dist = Math.hypot(e.clientX - lastP.x, e.clientY - lastP.y);
                accel = dist / (dt || 1);
            }

            currentPoints.push({
                x: Math.round(e.clientX),
                y: Math.round(e.clientY),
                pressure: e.pressure || 0.5,
                size: (e.width + e.height) / 2 || 1.0,
                accel: accel,
                time: Date.now()
            });
        }

        async function uploadData() {
            if (currentPoints.length < 2) return; // AI needs at least 2 points

            const payload = {
                user_id: 'genuine', // Reminder: Change to 'imposter' for testing
                session_id: sessionID,
                auth_type: mode,
                points: currentPoints
            };

            const status = document.getElementById('status');
            status.innerText = "Analyzing Rhythm...";

            try {
                const response = await fetch('/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                status.innerText = "AI Verdict: " + res.prediction + " (" + res.trust_score + ")";
                status.style.color = res.prediction === 'genuine' ? '#2ecc71' : '#e74c3c';
            } catch (err) {
                status.innerText = "Cloud Sync Error";
            }
            // Reset after upload
            currentPoints = [];
            pinBuffer = "";
        }

        // --- PATTERN EVENTS ---
        touchZone.onpointerdown = (e) => {
            drawing = true;
            sessionID = "PATT_" + Date.now();
            currentPoints = [];
            recordPoint(e);
        };

        touchZone.onpointermove = (e) => {
            if (!drawing) return;
            recordPoint(e);
            // Visual feedback
            document.querySelectorAll('.dot').forEach(dot => {
                const r = dot.getBoundingClientRect();
                const dx = r.left + r.width / 2, dy = r.top + r.height / 2;
                if (Math.hypot(e.clientX - dx, e.clientY - dy) < 25) dot.classList.add('active');
            });
        };

        touchZone.onpointerup = () => {
            drawing = false;
            uploadData();
            setTimeout(() => {
                document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            }, 500);
        };

        // --- PIN EVENTS (FIXED) ---
        function startTap(e, num) {
            // Start a session on the first digit
            if (pinBuffer.length === 0) {
                sessionID = "PIN_SESSION_" + Date.now();
                currentPoints = [];
            }
            recordPoint(e);
        }

        function endTap(e) {
            recordPoint(e);
            pinBuffer += "X";

            if (pinBuffer.length >= 4) {
                uploadData();
            } else {
                document.getElementById('status').innerText = "Digits: " + pinBuffer.length + "/4";
            }
        }
    </script>
</body>

</html>
